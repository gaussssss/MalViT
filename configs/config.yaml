data:
  raw_benign: data/raw/benign/
  raw_malware: data/raw/malware/
  processed_benign: data/processed/benign/
  processed_malware: data/processed/malware/
  images_train: data/images/train/
  images_val: data/images/val/
  images_test: data/images/test/

transformer:
  token_bits: 8
  num_layers: 6
  num_heads: 8
  hidden_size: 512

classifier:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001

image:
  contrast_enhancement: true
  contrast_mode: sigmoid

thresholds:
  block: 0.85
  quarantine: 0.50

saved_models:
  transformer: saved_models/transformer/
  classifier: saved_models/classifier/
